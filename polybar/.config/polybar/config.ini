[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
monitor = ${env:MONITOR:}
width = 100%
height = 22pt
radius = 6
; override-redirect = false
; wm-restack = i3

; dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 1pt
border-color = ${colors.primary}

padding-left = 0
padding-right = 0

module-margin = 1

separator =
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = Font Awesome 6 Free:size=10;2
font-2 = "Siji:pixelsize=10;1"

modules-left = xwindow xworkspaces
modules-center = filesystem memory cpu
modules-right = pulseaudio wlan systray date power
; modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

format = <label-state> <label-mode>

label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-foreground= #000000
label-focused-padding = 1.5
label-unfocused-padding = 1.5

label-mode = %mode%
label-mode-padding = 2
label-mode-background = #e60053


; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %class:0:30:...%
format-background = ${colors.background-alt}
format-foreground = ${colors.primary}
format-padding = 4

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

; label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-mounted = %{F#F0C674}яЗА %{F-}%free% / %total%
format-mounted = <label-mounted>

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/power]
type = custom/script
format = "яАС  Power"
format-background = ${colors.primary}
format-foreground = ${colors.background-alt}
format-padding = 2
exec = /bin/bash -c uname
; click-left = /bin/bash -c xss-lock --transfer-sleep-lock -- i3lock --nofork
click-left = /bin/bash -c xss-lock --transfer-sleep-lock -- $(i3lock -i $(find ~/wallpaper -type f | grep .png | shuf -n 1) --nofork)

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
; format-volume-prefix = <ramp-volume>
format-volume-prefix-foreground = ${colors.primary}
label-volume =  %percentage%%
format-volume = %{A3:pavucontrol:}%{F#F0C674}<ramp-volume>%{F-}  <label-volume>%{A}

label-muted = яЪй  muted
; label-muted-foreground = #666

; Only applies if <ramp-volume> is used
ramp-volume-0 = яАж
ramp-volume-1 = яАз
ramp-volume-2 = яАи
click-right = #pulseaudio.toggle
; label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
; format-prefix = "яЧЬ"
; format-prefix-foreground = ${colors.primary}
format = <label>
; bar-used-width = 10
; bar-used-foreground-0 = #55aa55
; bar-used-fill = -
; bar-used-empty = -
; bar-used-indicator =
label = "%{F#F0C674}яБГ%{F-} %percentage_used%%"

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "яЛЫ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
; label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-connected = %{F#F0C674}яЗл  %{A1:nm-connection-editor:}%essid%%{F-}%{A}
label-disconnected = %{F#FFFFFF}яЗл %{F-}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

[module/mpd]
type = internal/mpd
; Host where mpd is running (either ip or domain name)
; Can also be the full path to a unix socket where mpd is running.
host = 127.0.0.1
port = 6600
; password = mysecretpassword
; Seconds to sleep between progressbar/song timer sync
; Default: 1
interval = 2
; Available tags:
;   <label-song> (default)
;   <label-time>
;   <bar-progress>
;   <toggle> - gets replaced with <icon-(pause|play)>
;   <toggle-stop> - gets replaced with <icon-(stop|play)>
;   <icon-random>
;   <icon-repeat>
;   <icon-repeatone> (deprecated)
;   <icon-single> - Toggle playing only a single song. Replaces <icon-repeatone>
;   <icon-consume>
;   <icon-prev>
;   <icon-stop>
;   <icon-play>
;   <icon-pause>
;   <icon-next>
;   <icon-seekb>
;   <icon-seekf>
format-online = <icon-prev> <icon-seekb> <icon-stop> <toggle> <icon-seekf> <icon-next>  <icon-repeat> <icon-random>  <bar-progress> <label-time>  <label-song>
;format-playing = ${self.format-online}
;format-paused = ${self.format-online}
;format-stopped = ${self.format-online}

; Available tags:
;   <label-offline>
; Default: ""
;format-offline = <label-offline>

; Available tokens:
;   %artist%
;   %album-artist%
;   %album%
;   %date%
;   %title%
; Default: %artist% - %title%
label-song = ЁЭДЮ %artist% - %title%

; Available tokens:
;   %elapsed%
;   %total%
; Default: %elapsed% / %total%
;label-time = %elapsed% / %total%

; Available tokens:
;   None
label-offline = ЁЯОЬ mpd is offline

; Only applies if <icon-X> is used
icon-play = тП╡
icon-pause = тП╕
icon-stop = тП╣
icon-prev = тПо
icon-next = тПн
icon-seekb = тПк
icon-seekf = тПй
icon-random = ЁЯФА
icon-repeat = ЁЯФБ
icon-repeatone = ЁЯФВ
icon-single = ЁЯФВ
icon-consume = тЬА

; Used to display the state of random/repeat/repeatone/single
; Only applies if <icon-[random|repeat|repeatone|single]> is used
toggle-on-foreground = #ff
toggle-off-foreground = #55

; Only applies if <bar-progress> is used
bar-progress-width = 45
bar-progress-indicator = |
bar-progress-fill = тФА
bar-progress-empty = тФА

