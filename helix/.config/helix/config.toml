theme = "ayu_dark"

[editor]
line-number = "relative"
bufferline = "always"

[editor.indent-guides]
render = true
character = "┊" # Some characters that work well: "╎" "▏", "┆", "", "⸽"
skip-levels = 1

[editor.whitespace]
#space = ""
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
#newline = "⏎"
tabpad = "·" # Tabs will look like "→···" (depending on tab width)

[editor.whitespace.render]
space = "all"
tab = "all"
nbsp = "all"
nnbsp = "all"
newline = "none"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.normal.space.o]
e = [
  ":new",
  ":insert-output ~/.config/helix/lf-pick",
  ":theme default",
  "select_all",
  "split_selection_on_newline",
  "goto_file",
  "goto_last_modified_file",
  ":buffer-close!",
  ":theme ayu_dark",
  ":redraw"
]

g = [
  ":new",
  ":insert-output lazygit",
  ":theme default",
  ":buffer-close!",
  ":theme ayu_dark",
  ":redraw"
]
